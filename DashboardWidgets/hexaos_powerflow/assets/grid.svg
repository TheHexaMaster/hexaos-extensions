<svg id="grid-pylon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="gp_frame" x1="68" y1="28" x2="178" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7b8794"/>
      <stop offset="1" stop-color="#26313d"/>
    </linearGradient>

    <linearGradient id="gp_steel" x1="92" y1="44" x2="164" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c0cad6"/>
      <stop offset="1" stop-color="#7a8796"/>
    </linearGradient>

    <linearGradient id="gp_accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>

    <filter id="gp_shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#020617" flood-opacity="0.24"/>
    </filter>
  </defs>

  <g filter="url(#gp_shadow)">
    <!-- Power lines -->
    <path d="M18 78 H82" stroke="#64748b" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <path d="M174 78 H238" stroke="#64748b" stroke-width="5" stroke-linecap="round" opacity="0.85"/>

    <path d="M30 108 H84" stroke="#64748b" stroke-width="4.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M172 108 H226" stroke="#64748b" stroke-width="4.5" stroke-linecap="round" opacity="0.8"/>

    <!-- Top crossarm -->
    <rect x="72" y="68" width="112" height="18" rx="9"
          fill="url(#gp_frame)"
          stroke="#111827"
          stroke-width="3"/>

    <!-- Middle crossarm -->
    <rect x="84" y="98" width="88" height="16" rx="8"
          fill="url(#gp_frame)"
          stroke="#111827"
          stroke-width="3"/>

    <!-- Main tower -->
    <path d="M120 46 H136 L168 206 H88 Z"
          fill="url(#gp_frame)"
          stroke="#111827"
          stroke-width="4"
          stroke-linejoin="round"/>

    <!-- Inner steel face -->
    <path d="M124 60 H132 L156 192 H100 Z"
          fill="url(#gp_steel)"
          stroke="#94a3b8"
          stroke-width="2.5"
          stroke-linejoin="round"/>

    <!-- Top head -->
    <rect x="116" y="32" width="24" height="16" rx="6"
          fill="#374151"
          stroke="#111827"
          stroke-width="3"/>

    <!-- Bracing -->
    <g stroke="#475569" stroke-width="4" stroke-linecap="round">


      <path d="M108 164 H148"/>
      <path d="M112 140 H144"/>
      <path d="M116 116 H140"/>
      <path d="M120 92 H136"/>
    </g>

    <!-- Side supports to top crossarm -->
    <g stroke="#475569" stroke-width="4" stroke-linecap="round">
      <path d="M88 78 L118 78"/>
      <path d="M138 78 L168 78"/>

      <path d="M94 108 L118 108"/>
      <path d="M138 108 L162 108"/>
    </g>

    <!-- Insulators -->
    <g fill="#60a5fa" stroke="#1d4ed8" stroke-width="2">
      <circle cx="84" cy="78" r="4"/>
      <circle cx="172" cy="78" r="4"/>
      <circle cx="96" cy="108" r="4"/>
      <circle cx="160" cy="108" r="4"/>
    </g>


    <!-- Base -->
    <rect x="76" y="210" width="104" height="12" rx="6"
          fill="#111827"/>
    <rect x="90" y="204" width="76" height="8" rx="4"
          fill="#4b5563"/>
  </g>
</svg>