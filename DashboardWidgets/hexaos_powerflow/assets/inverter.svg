<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfd6df"/>
      <stop offset="100%" stop-color="#8f9baa"/>
    </linearGradient>

    <linearGradient id="frontGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b9c3cf"/>
      <stop offset="100%" stop-color="#7d8a99"/>
    </linearGradient>

    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#153b6d"/>
      <stop offset="100%" stop-color="#0b2342"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.20"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Main housing -->
    <rect x="128" y="64" width="256" height="344" rx="34" fill="url(#bodyGrad)" stroke="#5f6c7b" stroke-width="6"/>
    <rect x="146" y="82" width="220" height="308" rx="26" fill="url(#frontGrad)" stroke="#aab4bf" stroke-width="2"/>

    <!-- Top cap -->
    <rect x="154" y="76" width="204" height="24" rx="12" fill="#6f7b89" opacity="0.55"/>

    <!-- Display -->
    <rect x="182" y="122" width="148" height="96" rx="18" fill="url(#screenGrad)" stroke="#274c77" stroke-width="4"/>

    <!-- Sun symbol -->
    <g transform="translate(256 170)">
      <circle r="16" fill="url(#sunGrad)"/>
      <g stroke="#fbbf24" stroke-width="4.5" stroke-linecap="round">
        <line x1="0" y1="-30" x2="0" y2="-23"/>
        <line x1="0" y1="30" x2="0" y2="23"/>
        <line x1="-30" y1="0" x2="-23" y2="0"/>
        <line x1="30" y1="0" x2="23" y2="0"/>
        <line x1="-21" y1="-21" x2="-16" y2="-16"/>
        <line x1="21" y1="-21" x2="16" y2="-16"/>
        <line x1="-21" y1="21" x2="-16" y2="16"/>
        <line x1="21" y1="21" x2="16" y2="16"/>
      </g>
    </g>

    <!-- Center power emblem -->
    <g transform="translate(256 285)">
      <circle r="58" fill="#667486" opacity="0.22"/>
      <circle r="52" fill="#d6dde6" stroke="url(#ringGrad)" stroke-width="7"/>
      <circle r="42" fill="#94a3b8" opacity="0.22"/>
      <path d="M12 -36 L-10 -2 H6 L-8 34 L26 -8 H10 Z"
            fill="url(#boltGrad)" stroke="#b45309" stroke-width="3.5" stroke-linejoin="round"/>
    </g>

    <!-- Status LEDs -->
    <g transform="translate(256 360)">
      <circle cx="-52" cy="0" r="9" fill="#22c55e"/>
      <circle cx="0" cy="0" r="9" fill="#f59e0b"/>
      <circle cx="52" cy="0" r="9" fill="#ef4444"/>
      <circle cx="-52" cy="0" r="15" fill="none" stroke="#22c55e" stroke-opacity="0.25" stroke-width="5"/>
    </g>

    <!-- Vent slots -->
    <g fill="#6b7785" opacity="0.8">
      <rect x="194" y="382" width="124" height="6" rx="3"/>
      <rect x="202" y="394" width="108" height="6" rx="3"/>
    </g>

    <!-- Bottom connectors -->
    <g stroke="#4b5563" stroke-width="7" stroke-linecap="round">
      <line x1="188" y1="408" x2="188" y2="446"/>
      <line x1="256" y1="408" x2="256" y2="456"/>
      <line x1="324" y1="408" x2="324" y2="446"/>
    </g>

    <g fill="#5b6572">
      <rect x="174" y="446" width="28" height="18" rx="4"/>
      <rect x="242" y="456" width="28" height="18" rx="4"/>
      <rect x="310" y="446" width="28" height="18" rx="4"/>
    </g>

    <!-- Side screws -->
    <g fill="#6b7280">
      <circle cx="154" cy="116" r="4"/>
      <circle cx="358" cy="116" r="4"/>
      <circle cx="154" cy="370" r="4"/>
      <circle cx="358" cy="370" r="4"/>
    </g>
  </g>
</svg>